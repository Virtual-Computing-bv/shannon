name: Build Shannon worker image

# Build and push the shannon-worker image (root Dockerfile — Chainguard Wolfi
# + Chromium + playwright-cli) to GHCR so the Nahayat portal's DinD sidecar
# can pull it directly. Without this image the portal's CLI tries to
# `docker build .` inside DinD, which has no Dockerfile or source tree and
# fails immediately.
#
# Paths trigger on anything that changes the worker runtime — apps/worker,
# the root Dockerfile, entrypoint, or workspace manifests.

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/build-shannon-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  shannon-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/virtual-computing-bv/shannon-worker:latest
            ghcr.io/virtual-computing-bv/shannon-worker:${{ github.sha }}
          cache-from: type=gha,scope=shannon-worker
          cache-to: type=gha,mode=max,scope=shannon-worker
